# Netlify configuration — framework.co.ke
# Static site: plain HTML/JS with in-browser Babel (JSX compiled at runtime).
# No build step; published straight from the repo root.

[build]
  publish = "."
  # (no build command — nothing to compile)

# --- Preserve existing clean URLs (served extensionless on GitHub Pages) ---
# status = 200 is a rewrite: the URL stays clean, the .html file is served.
[[redirects]]
  from = "/designer"
  to = "/designer.html"
  status = 200

[[redirects]]
  from = "/shelving"
  to = "/shelving.html"
  status = 200

[[redirects]]
  from = "/simplified-designer"
  to = "/simplified-designer.html"
  status = 200

# --- Keep internal-only paths out of the public site ---
# These live in the repo for handoff/tooling but must not be served.
# force = true makes the redirect win over the real static file.
[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/scripts/*"
  to = "/404.html"
  status = 404
  force = true

