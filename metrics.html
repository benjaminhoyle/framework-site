<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Framework — Funnel Monitor</title>
  <style>
    :root { --bg:#0f1115; --card:#171a21; --line:#262b36; --ink:#e6e9ef; --dim:#9aa4b2; --accent:#22c55e; --warn:#f59e0b; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
    header { padding:20px 24px; border-bottom:1px solid var(--line); }
    h1 { margin:0 0 4px; font-size:18px; }
    .sub { color:var(--dim); font-size:13px; }
    main { padding:24px; max-width:1200px; margin:0 auto; }
    .cards { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px; }
    .stat { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px 18px; min-width:150px; }
    .stat .n { font-size:22px; font-weight:600; }
    .stat .l { color:var(--dim); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
    h2 { font-size:15px; margin:28px 0 12px; }
    .panel { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; overflow-x:auto; }
    table { border-collapse:collapse; width:100%; font-size:13px; white-space:nowrap; }
    th,td { text-align:right; padding:7px 10px; border-bottom:1px solid var(--line); }
    th:first-child,td:first-child { text-align:left; position:sticky; left:0; background:var(--card); }
    th { color:var(--dim); font-weight:500; cursor:pointer; user-select:none; }
    tr:hover td { background:#1c212b; }
    .flag { color:var(--warn); font-size:11px; }
    .pill { display:inline-block; padding:1px 7px; border-radius:20px; font-size:11px; border:1px solid var(--line); }
    .ACTIVE { color:var(--accent); border-color:#14532d; }
    svg text { fill:var(--dim); font-size:11px; }
    .msg { padding:60px 24px; text-align:center; color:var(--dim); }
    .msg code { background:var(--card); padding:2px 6px; border-radius:5px; color:var(--ink); }
    select { background:var(--card); color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:5px 8px; }
    .legend span { display:inline-flex; align-items:center; gap:5px; margin-right:14px; font-size:12px; color:var(--dim); }
    .sw { width:11px; height:11px; border-radius:2px; display:inline-block; }
  </style>
</head>
<body>
  <header>
    <h1>Framework — Funnel Monitor</h1>
    <div class="sub" id="sub">Loading…</div>
  </header>
  <main id="main"><div class="msg">Loading…</div></main>

  <script>
    // Checkpoint palette (C1→C7).
    var STAGES = [
      { k:'arrive', label:'C1 Arrived', color:'#334155' },
      { k:'product_view', label:'C2 Product view', color:'#3b82f6' },
      { k:'engage', label:'C3 Engaged', color:'#6366f1' },
      { k:'wa_handoff', label:'C4 WhatsApp handoff', color:'#a855f7' },
      { k:'conversation', label:'C5 Conversation', color:'#14b8a6' },
      { k:'quoted', label:'C6 Quoted', color:'#eab308' },
      { k:'sale', label:'C7 Sale', color:'#22c55e' },
    ];
    var kes = function (n) { return 'KSh ' + Math.round(n||0).toLocaleString('en-US'); };
    var esc = function (s) { return String(s==null?'':s).replace(/[&<>"]/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); };
    var key = new URLSearchParams(location.search).get('key');

    function show(html) { document.getElementById('main').innerHTML = html; }

    if (!key) {
      show('<div class="msg">This dashboard is private. Add your key to the URL:<br><br><code>' + location.origin + '/metrics.html?key=YOUR_KEY</code></div>');
    } else {
      fetch('/api/dashboard?key=' + encodeURIComponent(key))
        .then(function (r) {
          if (r.status === 401) throw new Error('Unauthorized — check your key.');
          if (r.status === 404) throw new Error('No data yet. Run the sync (./run.command --no-scrape --commit) to publish the first snapshot.');
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(render)
        .catch(function (e) { show('<div class="msg">' + esc(e.message) + '</div>'); });
    }

    function render(d) {
      // Freshness indicator — how long since the last sync.
      var gen = new Date(d.generatedAt);
      var days = Math.floor((Date.now() - gen.getTime()) / 86400000);
      var label = days <= 0 ? 'Synced today' : days === 1 ? 'Synced yesterday' : 'Synced ' + days + ' days ago';
      var color = days <= 2 ? 'var(--accent)' : days <= 7 ? 'var(--warn)' : '#ef4444';
      var nudge = days > 7 ? ' — time to refresh (see bottom of page)' : '';
      document.getElementById('sub').innerHTML =
        '<span style="color:' + color + ';font-weight:600">● ' + label + nudge + '</span>' +
        ' · <span style="color:var(--dim)">' + gen.toLocaleString() + ' · ' + d.perAd.length + ' ads</span>';
      var t = d.totals || {};
      var html = '<div class="cards">' +
        stat(kes(t.spend30), 'Spend (30d)') +
        stat(t.activeAds, 'Active ads') +
        stat(kes(t.anSpend30), 'Audience Network (30d)') +
        stat(t.flaggedAds, 'Ads with flags') +
        '</div>';

      html += '<h2>Monthly cohort funnel</h2>' + funnelPanel(d.cohorts);
      html += '<h2>Per-ad economics <span class="sub">(the weekly reallocation view)</span></h2>' + tablePanel(d.perAd);
      html += refreshPanel(days);
      show(html);
      wireSort(d.perAd);
    }

    function stat(n, l) { return '<div class="stat"><div class="n">' + esc(n) + '</div><div class="l">' + esc(l) + '</div></div>'; }

    function refreshPanel(days) {
      var warn = days > 7 ? '<p style="color:#f59e0b;font-weight:600">These numbers are ' + days + ' days old — refresh them before making budget decisions.</p>' : '';
      return '<h2>Keeping this up to date</h2>' +
        '<div class="panel" style="line-height:1.8;max-width:760px">' + warn +
        '<p>This page is a snapshot. To pull the latest ad spend and conversations:</p>' +
        '<ol>' +
        '<li>On the Mac, open Finder → <b>code</b> → <b>framework</b> → <b>mbs-scraper</b>.</li>' +
        '<li>Double-click <b>sync.command</b>. A window opens and runs for about 30 seconds.</li>' +
        '<li>When it says <b>“Press Enter to close this window”</b>, press Enter.</li>' +
        '<li>Come back here and reload the page (<b>Cmd&nbsp;+&nbsp;R</b>). The badge up top should read <b>“Synced today”</b>.</li>' +
        '</ol>' +
        '<p style="color:var(--dim)">No login or typing needed — just the double-click. Do this about once a week, or any time you want fresh numbers before reallocating budget.</p>' +
        '</div>';
    }

    function funnelPanel(cohorts) {
      if (!cohorts || !cohorts.length) return '<div class="panel"><div class="msg">No funnel data yet — it fills in as site sessions and conversations accrue.</div></div>';
      var W = Math.max(520, cohorts.length * 120), H = 260, padB = 34, padL = 40, padT = 10;
      var maxV = 1;
      cohorts.forEach(function (c) { STAGES.forEach(function (s) { maxV = Math.max(maxV, c[s.k] || 0); }); });
      var bw = (W - padL) / cohorts.length * 0.6, gap = (W - padL) / cohorts.length;
      var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" preserveAspectRatio="xMinYMin meet">';
      // gridlines
      for (var g = 0; g <= 4; g++) { var y = padT + (H-padT-padB) * g/4; var val = Math.round(maxV*(4-g)/4); svg += '<line x1="'+padL+'" y1="'+y+'" x2="'+W+'" y2="'+y+'" stroke="#262b36"/><text x="0" y="'+(y+4)+'">'+val+'</text>'; }
      cohorts.forEach(function (c, i) {
        var x = padL + i*gap + gap*0.2;
        // grouped thin bars per stage (a funnel read left→right within the month)
        var sw = bw / STAGES.length;
        STAGES.forEach(function (s, si) {
          var v = c[s.k] || 0;
          var h = (H-padT-padB) * v / maxV;
          var bx = x + si*sw;
          svg += '<rect x="'+bx+'" y="'+(H-padB-h)+'" width="'+(sw-1)+'" height="'+h+'" fill="'+s.color+'"><title>'+s.label+' — '+v+' ('+c.month+')</title></rect>';
        });
        svg += '<text x="'+(x+bw/2)+'" y="'+(H-padB+16)+'" text-anchor="middle">'+c.month+'</text>';
      });
      svg += '</svg>';
      var legend = '<div class="legend">' + STAGES.map(function (s) { return '<span><span class="sw" style="background:'+s.color+'"></span>'+s.label+'</span>'; }).join('') + '</div>';
      return '<div class="panel">' + legend + svg + '</div>';
    }

    var COLS = [
      { k:'name', l:'Ad', t:1 }, { k:'status', l:'Status', t:1 },
      { k:'spend30', l:'Spend 30d', m:1 }, { k:'impressions30', l:'Impr' }, { k:'clicks30', l:'Clicks' },
      { k:'convosMeta30', l:'Convos (Meta)' }, { k:'ourConversations', l:'Our convos' },
      { k:'qualified', l:'Qualified' }, { k:'sales', l:'Sales' }, { k:'revenue', l:'Revenue', m:1 },
      { k:'costPerConvo', l:'Cost/convo', m:1 }, { k:'flags', l:'Flags', t:1 },
    ];
    function tablePanel(rows) {
      var head = '<tr>' + COLS.map(function (c) { return '<th data-k="'+c.k+'">'+c.l+'</th>'; }).join('') + '</tr>';
      return '<div class="panel"><table id="tbl"><thead>' + head + '</thead><tbody>' + body(rows) + '</tbody></table></div>';
    }
    function body(rows) {
      return rows.map(function (r) {
        return '<tr>' + COLS.map(function (c) {
          var v = r[c.k];
          if (c.k === 'name') return '<td>'+esc(v)+'</td>';
          if (c.k === 'status') return '<td><span class="pill '+esc(v)+'">'+esc(v)+'</span></td>';
          if (c.k === 'flags') return '<td class="flag">'+esc((v||[]).join(', '))+'</td>';
          if (c.m) return '<td>'+(v==null?'—':kes(v))+'</td>';
          return '<td>'+(v==null?'—':v)+'</td>';
        }).join('') + '</tr>';
      }).join('');
    }
    function wireSort(rows) {
      var dir = {};
      document.querySelectorAll('#tbl th').forEach(function (th) {
        th.addEventListener('click', function () {
          var k = th.getAttribute('data-k');
          dir[k] = !dir[k];
          rows.sort(function (a, b) { var x=a[k], y=b[k]; if (typeof x==='string'||x==null) { x=String(x); y=String(y); } return (x>y?1:x<y?-1:0) * (dir[k]?1:-1); });
          document.querySelector('#tbl tbody').innerHTML = body(rows);
        });
      });
    }
  </script>
</body>
</html>
