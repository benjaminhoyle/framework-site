<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Framework — Funnel Monitor</title>
  <style>
    :root {
      --bg:#0f1115; --card:#171a21; --line:#262b36; --line-soft:#1e222b;
      --ink:#e6e9ef; --dim:#9aa4b2; --muted:#6b7480;
      /* Status palette — fixed, never reused for series identity. */
      --good:#0ca30c; --warning:#fab219; --serious:#ec835a; --critical:#d03b3b;
      /* Ordinal funnel ramp (one hue, light→dark) — validated on this surface. */
      --f1:#cde2fb; --f2:#86b6ef; --f3:#3987e5; --f4:#184f95;
      --o1:#9ec5f4; --o2:#3987e5; --o3:#184f95;
      /* Categorical series (trend chart) — validated pair. */
      --s1:#3987e5; --s2:#199e70;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink);
      font:14px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif; }
    a { color:inherit; }

    header { padding:18px 28px; border-bottom:1px solid var(--line); display:flex;
      align-items:baseline; gap:16px; flex-wrap:wrap; }
    h1 { margin:0; font-size:17px; letter-spacing:-.01em; }
    .nav { font-size:13px; color:var(--dim); text-decoration:none; }
    .nav:hover { color:var(--ink); }
    .freshness { margin-left:auto; font-size:12.5px; }

    main { padding:24px 28px 72px; max-width:1280px; margin:0 auto; }
    section { margin-bottom:34px; }
    .sec-head { display:flex; align-items:baseline; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
    h2 { font-size:14px; margin:0; letter-spacing:.01em; }
    .sec-note { font-size:12.5px; color:var(--muted); }
    .sec-head .right { margin-left:auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    /* Three control groups plus a search box overflow a phone; let them stack
       rather than push the page into a horizontal scroll. The table keeps its own
       scroll container — the body never scrolls sideways. */
    @media (max-width:760px) {
      .sec-head .right { width:100%; margin-left:0; }
      .sec-head .right input[type=search] { flex:1 1 100%; }
      .seg { flex:0 1 auto; }
    }

    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; }
    .pad { padding:18px 20px; }

    /* Verdict — the top of the hierarchy. One question: is what's live working?
       Everything below it is evidence for this answer, so it is the only thing on
       the page allowed to be this loud. */
    .verdict { background:var(--card); border:1px solid var(--line); border-left:3px solid var(--muted);
      border-radius:12px; padding:19px 22px 20px; }
    .verdict.not_working { border-left-color:var(--critical); }
    .verdict.stalled     { border-left-color:var(--serious); }
    .verdict.working     { border-left-color:var(--good); }
    .verdict .eyebrow { font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .verdict .say { font-size:23px; font-weight:600; letter-spacing:-.02em; margin:5px 0 0; }
    .verdict.not_working .say { color:var(--critical); }
    .verdict.stalled .say     { color:var(--serious); }
    .verdict.working .say     { color:var(--good); }
    .verdict .setup { font-size:13px; color:var(--dim); margin-top:7px; font-variant-numeric:tabular-nums; }
    .verdict .setup b { color:var(--ink); font-weight:600; }

    /* The money chain: spend → conversations → sales, in one reading line. */
    .chain { display:flex; align-items:stretch; gap:0; margin-top:17px; flex-wrap:wrap;
      border-top:1px solid var(--line); padding-top:16px; }
    .chain .step { padding-right:26px; }
    .chain .step + .step { padding-left:26px; border-left:1px solid var(--line-soft); }
    .chain .n { font-size:21px; font-weight:600; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
    .chain .n.nil { color:var(--critical); }
    .chain .k { font-size:11.5px; color:var(--muted); margin-top:2px; }

    /* Trust check — only rendered when the two counts actually disagree. */
    .trust { margin-top:15px; padding-top:14px; border-top:1px solid var(--line); font-size:13px; color:var(--dim); }
    .trust b { color:var(--ink); font-weight:600; font-variant-numeric:tabular-nums; }
    .trust .verdictline { color:var(--serious); margin-top:4px; }

    /* Alerts */
    .alert { border-radius:10px; padding:13px 16px; margin-bottom:12px; border:1px solid;
      display:flex; gap:11px; align-items:flex-start; font-size:13.5px; }
    .alert .ic { flex:0 0 auto; font-size:14px; line-height:1.35; }
    .alert b { display:block; margin-bottom:2px; }
    .alert.critical { border-color:var(--critical); background:rgba(208,59,59,.10); }
    .alert.warn { border-color:var(--warning); background:rgba(250,178,25,.09); }
    .alert.info { border-color:var(--line); background:var(--card); }

    /* Controls */
    .seg { display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
    .seg button { background:transparent; border:0; color:var(--dim); padding:6px 12px;
      font-size:12.5px; cursor:pointer; font-family:inherit; }
    .seg button + button { border-left:1px solid var(--line); }
    .seg button.on { background:#212734; color:var(--ink); }
    input[type=search], select { background:var(--bg); color:var(--ink); border:1px solid var(--line);
      border-radius:8px; padding:6px 10px; font-size:12.5px; font-family:inherit; }
    input[type=search]::placeholder { color:var(--muted); }

    /* Table */
    .tablewrap { overflow-x:auto; }
    table { border-collapse:collapse; width:100%; font-size:13px; }
    th, td { text-align:right; padding:9px 12px; white-space:nowrap; }
    th:first-child, td:first-child { text-align:left; position:sticky; left:0; background:var(--card); }
    thead th { color:var(--muted); font-weight:500; font-size:11.5px; text-transform:uppercase;
      letter-spacing:.04em; cursor:pointer; user-select:none; border-bottom:1px solid var(--line); }
    thead th:hover { color:var(--ink); }
    thead th .arrow { opacity:.45; font-size:9px; }
    tbody tr { border-bottom:1px solid var(--line-soft); }
    tbody tr:hover td { background:#1c212b; }
    tbody tr:hover td:first-child { background:#1c212b; }
    td.num { font-variant-numeric:tabular-nums; }
    .adname { font-weight:500; }
    .adsub { font-size:11.5px; color:var(--muted); margin-top:1px; }
    .lead { color:var(--ink); font-weight:600; }
    .zero { color:var(--muted); }
    /* Ad / campaign / ad set names are long; keep the row scannable and put the
       full text in the title attribute rather than wrapping the table out of shape. */
    td.text { text-align:left; color:var(--dim); max-width:150px; overflow:hidden;
      text-overflow:ellipsis; font-size:12.5px; }
    th.text { text-align:left; }
    /* Truncate the NAME, never the status pill or the ad count — those are the
       parts that change what the row means. */
    td:first-child { max-width:240px; }
    td:first-child .adname { display:flex; align-items:center; gap:7px; }
    td:first-child .adname .nm { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
    td:first-child .adname .pill, td:first-child .adname .gcount { flex:0 0 auto; }
    tbody tr.grouprow td:first-child { font-weight:600; }
    .gcount { color:var(--muted); font-weight:400; font-size:11.5px; }

    .pill { display:inline-block; padding:1.5px 8px; border-radius:20px; font-size:11px;
      border:1px solid var(--line); color:var(--dim); }
    .pill.ACTIVE { color:var(--good); border-color:rgba(12,163,12,.45); }

    /* nowrap: chips stacking inside a narrow column gave rows three different
       heights, which reads as a broken table rather than as information. */
    .chips { display:flex; gap:4px; flex-wrap:nowrap; justify-content:flex-end; }
    .chip { font-size:10.5px; padding:1.5px 7px; border-radius:5px; border:1px solid; white-space:nowrap; }
    .chip.warning { color:var(--warning); border-color:rgba(250,178,25,.4); }
    .chip.serious { color:var(--serious); border-color:rgba(236,131,90,.4); }
    .chip.info { color:var(--dim); border-color:var(--line); }
    .chip.ok { color:var(--good); border-color:rgba(12,163,12,.35); }
    .chip.more { color:var(--muted); border-color:var(--line); }
    .chips[title] { cursor:help; }

    /* Funnel */
    .funnels { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:860px) { .funnels { grid-template-columns:1fr; } }
    .fn-title { font-size:12.5px; color:var(--ink); margin-bottom:2px; }
    .fn-sub { font-size:11.5px; color:var(--muted); margin-bottom:14px; }
    .stage { margin-bottom:11px; }
    .stage .row1 { display:flex; justify-content:space-between; align-items:baseline; font-size:12.5px; margin-bottom:4px; }
    .stage .nm { color:var(--dim); }
    .stage .val { font-variant-numeric:tabular-nums; }
    .stage .val b { font-size:14px; }
    .stage .pct { color:var(--muted); font-size:11.5px; margin-left:6px; }
    .bar { height:9px; border-radius:4px; background:#0d1017; overflow:hidden; }
    .bar span { display:block; height:100%; border-radius:4px; }

    /* Trend chart */
    .legend { display:flex; gap:16px; font-size:12px; color:var(--dim); margin-bottom:10px; }
    .legend i { display:inline-block; width:9px; height:9px; border-radius:2px; margin-right:6px; vertical-align:-1px; }
    svg text { fill:var(--muted); font-size:10.5px; font-variant-numeric:tabular-nums; }
    .tip { position:fixed; pointer-events:none; background:#0b0d12; border:1px solid var(--line);
      border-radius:8px; padding:8px 11px; font-size:12px; z-index:50; opacity:0;
      transition:opacity .09s; box-shadow:0 6px 22px rgba(0,0,0,.5); }
    .tip .t { color:var(--muted); font-size:11px; margin-bottom:3px; }
    .tip .r { display:flex; gap:12px; justify-content:space-between; }
    .tip .r span:last-child { font-variant-numeric:tabular-nums; }

    details { border-top:1px solid var(--line); padding-top:14px; margin-top:8px; }
    details summary { cursor:pointer; font-size:13px; color:var(--dim); list-style:none; }
    details summary::-webkit-details-marker { display:none; }
    details summary:before { content:"▸ "; color:var(--muted); }
    details[open] summary:before { content:"▾ "; }
    details .inner { padding:14px 2px 4px; line-height:1.75; max-width:820px; }
    code, .mono { font-family:ui-monospace,Menlo,monospace; }
    .copyrow { display:flex; gap:8px; margin-top:6px; }
    .copyrow textarea { flex:1; min-width:0; background:var(--bg); color:var(--ink);
      border:1px solid var(--line); border-radius:7px; padding:8px; font-family:ui-monospace,Menlo,monospace;
      font-size:11.5px; resize:none; }
    .btn { background:var(--card); color:var(--ink); border:1px solid var(--line);
      border-radius:7px; padding:6px 13px; cursor:pointer; font-size:12.5px; font-family:inherit; }
    .btn:hover { border-color:var(--dim); }
    .msg { padding:70px 24px; text-align:center; color:var(--dim); }
    .msg code { background:var(--card); padding:2px 6px; border-radius:5px; color:var(--ink); }
    .empty { color:var(--muted); font-size:12.5px; padding:16px 2px; }
  </style>
</head>
<body>
  <header>
    <h1>Framework — Funnel Monitor</h1>
    <a class="nav" id="navCatalog" href="#">→ Catalog Manager</a>
    <div class="freshness" id="fresh"></div>
  </header>
  <main id="main"><div class="msg">Loading…</div></main>
  <div class="tip" id="tip"></div>

  <script>
  (function () {
    var key = new URLSearchParams(location.search).get('key');
    var esc = function (s) { return String(s==null?'':s).replace(/[&<>"]/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); };
    var kes = function (n) { return 'KSh ' + Math.round(Number(n)||0).toLocaleString('en-US'); };
    var num = function (n) { return (Number(n)||0).toLocaleString('en-US'); };
    var show = function (h) { document.getElementById('main').innerHTML = h; };
    var D = null, view = { filter:'spending', group:'ad', win:'30d', sort:'spend30', dir:-1, q:'', month:null, trendTable:false };

    if (!key) {
      show('<div class="msg">This dashboard is private. Add your key to the URL:<br><br>' +
           '<code>' + location.origin + '/metrics.html?key=YOUR_KEY</code></div>');
      return;
    }
    document.getElementById('navCatalog').href = '/catalog.html?key=' + encodeURIComponent(key);

    fetch('/api/dashboard?key=' + encodeURIComponent(key))
      .then(function (r) {
        if (r.status === 401) throw new Error('Unauthorized — check your key.');
        if (r.status === 404) throw new Error('No data yet. Run the sync (double-click sync.command) to publish the first snapshot.');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (d) { D = d; boot(); })
      .catch(function (e) { show('<div class="msg">' + esc(e.message) + '</div>'); });

    // ---- flag presentation: short label + severity, never colour alone ----
    // Severity ranks by "is this costing me money right now", because only one
    // flag per row is shown and it should be the one that decides what you do.
    // serious = money leaving with nothing coming back; warning = plumbing that
    // will cost you later; info = worth fixing, not urgent.
    var FLAGS = {
      delivery_stalled:        { s:'serious', t:'not delivering', d:'Reads ACTIVE but spent nothing in 3 days — check the account spend cap or schedule.' },
      spend_no_conversations:  { s:'serious', t:'no conversations', d:'Spend > 0 in 30d with zero conversations started.' },
      audience_network_on:     { s:'serious', t:'audience network', d:'Audience Network is taking spend right now (last 7 days) — off-platform junk inventory. Historic Audience Network spend inside the 30-day window no longer raises this; only live delivery does.' },
      missing_url_tags:        { s:'warning', t:'no url_tags', d:'No url_tags, so conversations cannot be traced back to this ad.' },
      no_catalog_anchor:       { s:'warning', t:'stale product', d:'Deep-links to a product no longer in the live catalog.' },
      frequency_fatigue:       { s:'warning', t:'fatigue', d:'Frequency above 3.5 — the same people keep seeing it.' },
      destination_not_deeplink:{ s:'info',    t:'no deep-link', d:'Lands on the bare catalog instead of a specific product.' }
    };

    function boot() {
      var months = (D.cohorts||[]).map(function (c) { return c.month; });
      var withSite = (D.cohorts||[]).filter(function (c) { return c.arrive > 0; });
      view.month = withSite.length ? withSite[withSite.length-1].month : (months[months.length-1] || null);
      render();
    }

    function render() {
      var gen = new Date(D.generatedAt);
      var days = Math.floor((Date.now() - gen.getTime()) / 86400000);
      var lbl = days <= 0 ? 'Synced today' : days === 1 ? 'Synced yesterday' : 'Synced ' + days + ' days ago';
      var col = days <= 2 ? 'var(--good)' : days <= 7 ? 'var(--warning)' : 'var(--critical)';
      document.getElementById('fresh').innerHTML =
        '<span style="color:' + col + '">● ' + lbl + '</span>' +
        '<span style="color:var(--muted)"> · ' + gen.toLocaleString() + '</span>';

      var h = verdict() + alerts() + adTable() + funnels() + trend() + footerPanels();
      show(h);
      wire();
    }

    // ---------- alerts ----------
    function alerts() {
      var a = D.alerts || [];
      if (!a.length) return '';
      return a.map(function (x) {
        var cls = x.level === 'critical' ? 'critical' : x.level === 'warn' ? 'warn' : 'info';
        var ic  = x.level === 'critical' ? '⛔' : x.level === 'warn' ? '⚠' : 'ⓘ';
        return '<div class="alert ' + cls + '"><span class="ic">' + ic + '</span><span><b>' +
          esc(String(x.code).replace(/_/g,' ')) + '</b>' + esc(x.message) + '</span></div>';
      }).join('');
    }

    // ---------- verdict: is what's live working? ----------
    // Replaces the old four-KPI row. Those four numbers were true but answered
    // nothing on their own — you still had to do the division in your head and
    // then go hunting for whether the ads producing them were even running.
    var SAY = {
      working:      { t:'Live and working' },
      not_working:  { t:'Live — not working' },
      stalled:      { t:'Live but not delivering' },
      nothing_live: { t:'Nothing is live' }
    };
    function verdict() {
      var v = D.live; if (!v) return '';
      var s = SAY[v.verdict] || SAY.nothing_live;

      // Line 1 — the setup: what is running and how long it can keep running.
      var setup = v.verdict === 'nothing_live'
        ? 'No active ads. Nothing is spending.'
        : '<b>' + num(v.activeAds) + '</b> active ad' + (v.activeAds===1?'':'s') +
          (v.dailyBudget ? ' · <b>' + kes(v.dailyBudget) + '</b>/day' : '') +
          (v.runwayDays != null ? ' · <b>' + v.runwayDays.toFixed(1) + '</b> days of runway' : '');

      // Line 2 — the money chain. Zero at the end of the chain is the whole point,
      // so it is coloured; every other number stays neutral.
      var chain = v.verdict === 'nothing_live' ? '' :
        '<div class="chain">' +
          step(kes(v.spend30), 'spent · 30 days') +
          step(num(v.convosMeta30), 'conversations', !v.convosMeta30) +
          step(num(v.sales30), v.sales30 === 1 ? 'sale' : 'sales', !v.sales30) +
          (v.revenue30 ? step(kes(v.revenue30), 'revenue') : '') +
          (v.costPerConvo30 != null ? step(kes(v.costPerConvo30), 'per conversation') : '') +
        '</div>';

      return '<section><div class="verdict ' + esc(v.verdict) + '">' +
        '<div class="eyebrow">Live right now</div>' +
        '<div class="say">' + esc(s.t) + '</div>' +
        '<div class="setup">' + setup + '</div>' +
        chain + trustCheck(v) +
      '</div></section>';
    }
    function step(n, k, nil) {
      return '<div class="step"><div class="n' + (nil?' nil':'') + '">' + esc(n) + '</div>' +
        '<div class="k">' + esc(k) + '</div></div>';
    }

    // Meta counts a landing-page view off its own click; the site counts a session
    // that actually loaded. When those two disagree badly the clicks were not
    // people. Stays silent unless it has something to say — this is the one place
    // a discrepancy is worth interrupting for.
    function trustCheck(v) {
      if (!v.metaLanding30) return '';
      var ratio = v.metaLanding30 ? v.siteArrivals30 / v.metaLanding30 : 1;
      var bad = v.metaLanding30 >= 200 && ratio < 0.5;
      return '<div class="trust">Meta counted <b>' + num(v.metaLanding30) + '</b> landing views' +
        '; your site recorded <b>' + num(v.siteArrivals30) + '</b> arrivals.' +
        (bad ? '<div class="verdictline">Only ' + Math.round(ratio*100) + '% of those clicks became a real visit — ' +
               'the rest never loaded the site.</div>' : '') +
      '</div>';
    }

    // ---------- per-ad economics (the decision surface) ----------
    // Campaign / ad set / ad are columns, and any of the three can be the row
    // identity. Every metric column names its own window in the header, because
    // 30d spend and lifetime revenue in one row is otherwise a trap.
    var MEASURES = ['spend30','spendLife','convosMeta30','ourConversations','sales','sales30','revenue','revenue30'];

    // One window at a time, chosen explicitly — rather than 30-day spend sitting
    // next to lifetime revenue in the same row, which reads as a ratio and isn't
    // one. Switching to Lifetime is also how the paused boosted posts become
    // comparable: they have no 30-day anything, and all the revenue.
    var WIN = {
      '30d':  { spend:'spend30',   convos:'convosMeta30',     cpc:'costPerConvo30',
                sales:'sales30',   revenue:'revenue30',
                l:{ spend:'Spend 30d', convos:'Convos 30d', cpc:'Cost/convo', sales:'Sales 30d', revenue:'Revenue 30d' },
                hint:{ convos:'Conversations started in the last 30 days, as counted by Meta.',
                       cpc:'30-day spend ÷ 30-day conversations. Same window both sides.' } },
      'life': { spend:'spendLife', convos:'ourConversations', cpc:'costPerConvoLife',
                sales:'sales',     revenue:'revenue',
                l:{ spend:'Spend life', convos:'Attributed', cpc:'Cost/convo', sales:'Sales', revenue:'Revenue' },
                hint:{ convos:'Every conversation in Airtable carrying this Meta Ad ID, all time — Meta has no lifetime messaging data for boosted posts, our attribution does.',
                       cpc:'Lifetime spend ÷ lifetime attributed conversations.' } }
    };
    function cols() {
      var g = view.group, w = WIN[view.win];
      var c = [{ k:'name', l: g==='campaign' ? 'Campaign' : g==='adset' ? 'Ad set' : 'Ad', t:1 }];
      if (g === 'ad')    c.push({ k:'campaign', l:'Campaign', x:1 }, { k:'adset', l:'Ad set', x:1 });
      if (g === 'adset') c.push({ k:'campaign', l:'Campaign', x:1 });
      return c.concat([
        { k:w.spend,   l:w.l.spend,   m:1 },
        { k:w.convos,  l:w.l.convos },
        { k:w.cpc,     l:w.l.cpc,     m:1, lead:1 },
        { k:w.sales,   l:w.l.sales },
        { k:w.revenue, l:w.l.revenue, m:1 },
        { k:'flags',   l:'Flags',     t:1 }
      ]);
    }

    // Roll a set of ads up onto one row. Ratios are recomputed from the summed
    // parts (never averaged), and a group counts as ACTIVE if anything in it is.
    function aggregate(ads, keyOf, nameOf) {
      var m = new Map(), order = [];
      ads.forEach(function (a) {
        var k = String(keyOf(a) || '—'), g = m.get(k);
        if (!g) {
          g = { key:k, name:nameOf(a) || '—', campaign:a.campaign, adset:a.adset, n:0, status:'PAUSED', flags:[] };
          MEASURES.forEach(function (f) { g[f] = 0; });
          m.set(k, g); order.push(g);
        }
        g.n++;
        MEASURES.forEach(function (f) { g[f] += Number(a[f]) || 0; });
        if (a.status === 'ACTIVE') g.status = 'ACTIVE';
        (a.flags||[]).forEach(function (f) { if (g.flags.indexOf(f) < 0) g.flags.push(f); });
      });
      order.forEach(function (g) {
        ['spend30','spendLife','revenue','revenue30'].forEach(function (f) { g[f] = Math.round(g[f]*100)/100; });
        // Recomputed from the summed parts, never averaged — and each ratio keeps
        // both of its sides inside one window.
        g.costPerConvo30   = g.convosMeta30     ? Math.round(g.spend30/g.convosMeta30*100)/100     : null;
        g.costPerConvoLife = g.ourConversations ? Math.round(g.spendLife/g.ourConversations*100)/100 : null;
      });
      return order;
    }

    function visibleRows() {
      var ads = (D.perAd || []).slice();
      if (view.filter === 'spending') ads = ads.filter(function (p) { return (p.spend30||0) > 0; });
      else if (view.filter === 'active') ads = ads.filter(function (p) { return p.status === 'ACTIVE'; });
      if (view.q) {
        var q = view.q.toLowerCase();
        ads = ads.filter(function (p) {
          return ((p.name||'') + ' ' + (p.campaign||'') + ' ' + (p.adset||'')).toLowerCase().indexOf(q) >= 0;
        });
      }
      var rows = view.group === 'campaign'
          ? aggregate(ads, function(a){return a.campaignId||a.campaign;}, function(a){return a.campaign;})
        : view.group === 'adset'
          ? aggregate(ads, function(a){return a.adsetId||a.adset;}, function(a){return a.adset;})
        : ads;

      var k = view.sort, dir = view.dir;
      rows.sort(function (a,b) {
        var x = a[k], y = b[k];
        if (k === 'flags') { x = (a.flags||[]).length; y = (b.flags||[]).length; }
        if (typeof x === 'string' || typeof y === 'string') { x = String(x==null?'':x).toLowerCase(); y = String(y==null?'':y).toLowerCase(); return x>y?dir:x<y?-dir:0; }
        x = x == null ? -1 : x; y = y == null ? -1 : y;
        return (x-y) * dir;
      });
      return rows;
    }

    function adTable() {
      var rows = visibleRows(), C = cols();
      var counts = {
        spending: (D.perAd||[]).filter(function(p){return (p.spend30||0)>0;}).length,
        active:   (D.perAd||[]).filter(function(p){return p.status==='ACTIVE';}).length,
        all:      (D.perAd||[]).length
      };
      var w = WIN[view.win];
      var head = '<section><div class="sec-head"><h2>Per-ad economics</h2>' +
        '<span class="sec-note">where the money went, and what it bought</span>' +
        '<span class="right">' +
          '<input type="search" id="adq" placeholder="Filter…" value="' + esc(view.q) + '">' +
          '<span class="seg">' + winbtn('30d','30 days') + winbtn('life','Lifetime') + '</span>' +
          '<span class="seg">' + grpbtn('ad','By ad') + grpbtn('adset','By ad set') + grpbtn('campaign','By campaign') + '</span>' +
          '<span class="seg">' +
            segbtn('spending','Spending (' + counts.spending + ')') +
            segbtn('active','Active (' + counts.active + ')') +
            segbtn('all','All (' + counts.all + ')') +
          '</span>' +
        '</span></div>';

      if (!rows.length) return head + '<div class="card pad"><div class="empty">Nothing matches this view.</div></div></section>';

      var HINTS = {
        spend30: 'Meta spend in the last 30 days.',
        spendLife: 'Everything this ad has ever spent.',
        revenue: 'All-time revenue from orders on conversations attributed here.',
        revenue30: 'Revenue from conversations that started in the last 30 days. Sales close slowly, so this lags spend.',
        sales30: 'Sales from conversations that started in the last 30 days.'
      };
      HINTS[w.convos] = w.hint.convos;
      HINTS[w.cpc] = w.hint.cpc;
      var th = C.map(function (c) {
        var on = view.sort === c.k;
        return '<th data-k="' + c.k + '"' + (c.x ? ' class="text"' : '') +
          (HINTS[c.k] ? ' title="' + esc(HINTS[c.k]) + '"' : '') + '>' + esc(c.l) +
          (on ? ' <span class="arrow">' + (view.dir < 0 ? '▼' : '▲') + '</span>' : '') + '</th>';
      }).join('');

      var grouped = view.group !== 'ad';
      var body = rows.map(function (p) {
        return '<tr' + (grouped ? ' class="grouprow"' : '') + '>' + C.map(function (c) {
          if (c.k === 'name') {
            return '<td title="' + esc(p.name || '') + '"><div class="adname">' +
              '<span class="nm">' + esc(p.name || '—') + '</span>' +
              '<span class="pill ' + esc(p.status) + '">' + esc(p.status) + '</span>' +
              (grouped ? '<span class="gcount">' + num(p.n) + ' ad' + (p.n===1?'':'s') + '</span>' : '') +
              '</div></td>';
          }
          if (c.x) { var t = p[c.k] || '—'; return '<td class="text" title="' + esc(t) + '">' + esc(t) + '</td>'; }
          if (c.k === 'flags') return '<td>' + flagCell(p.flags || []) + '</td>';
          var v = p[c.k];
          var cls = 'num' + (c.lead ? ' lead' : '') + ((v == null || v === 0) ? ' zero' : '');
          return '<td class="' + cls + '">' + (v == null ? '—' : (c.m ? kes(v) : num(v))) + '</td>';
        }).join('') + '</tr>';
      }).join('');

      return head + '<div class="card"><div class="tablewrap"><table id="adtable"><thead><tr>' + th +
        '</tr></thead><tbody>' + body + '</tbody></table></div></div></section>';
    }
    // One chip per row: the worst thing wrong, plus a count of the rest. Three
    // stacked chips per row was three lines of small print competing with the
    // numbers — and the row's worst problem is the one that decides what you do.
    // The full list stays one hover away.
    var SEV = { serious:0, warning:1, info:2 };
    function flagCell(f) {
      if (!f.length) return '<span class="chips"><span class="chip ok">clean</span></span>';
      var metas = f.map(function (code) {
        return FLAGS[code] || { s:'info', t:code.replace(/_/g,' '), d:code };
      }).sort(function (a,b) { return (SEV[a.s]==null?9:SEV[a.s]) - (SEV[b.s]==null?9:SEV[b.s]); });
      var all = metas.map(function (m) { return '• ' + m.t + ' — ' + m.d; }).join('\n');
      var top = metas[0], rest = metas.length - 1;
      return '<span class="chips" title="' + esc(all) + '">' +
        '<span class="chip ' + top.s + '">' + esc(top.t) + '</span>' +
        (rest ? '<span class="chip more">+' + rest + '</span>' : '') +
      '</span>';
    }

    function segbtn(v, l) {
      return '<button data-filter="' + v + '" class="' + (view.filter===v?'on':'') + '">' + esc(l) + '</button>';
    }
    function grpbtn(v, l) {
      return '<button data-group="' + v + '" class="' + (view.group===v?'on':'') + '">' + esc(l) + '</button>';
    }
    function winbtn(v, l) {
      return '<button data-win="' + v + '" class="' + (view.win===v?'on':'') + '">' + esc(l) + '</button>';
    }

    // ---------- funnels ----------
    function cohortFor(month) {
      var cs = D.cohorts || [];
      if (month === '__all') {
        return cs.reduce(function (a,c) {
          ['arrive','product_view','engage','wa_handoff','conversation','quoted','sale','revenue'].forEach(function (k) { a[k] = (a[k]||0) + (c[k]||0); });
          return a;
        }, { month:'__all' });
      }
      return cs.find(function (c) { return c.month === month; }) || {};
    }
    function funnels() {
      var c = cohortFor(view.month);
      var opts = (D.cohorts||[]).map(function (x) {
        return '<option value="' + x.month + '"' + (x.month===view.month?' selected':'') + '>' + x.month + '</option>';
      }).join('') + '<option value="__all"' + (view.month==='__all'?' selected':'') + '>All time</option>';

      var site = [
        { k:'arrive',       l:'Arrived',        c:'var(--f1)' },
        { k:'product_view', l:'Saw a product',  c:'var(--f2)' },
        { k:'engage',       l:'Engaged',        c:'var(--f3)' },
        { k:'wa_handoff',   l:'WhatsApp handoff', c:'var(--f4)' }
      ];
      var out = [
        { k:'conversation', l:'Conversation', c:'var(--o1)' },
        { k:'quoted',       l:'Quoted',       c:'var(--o2)' },
        { k:'sale',         l:'Sale',         c:'var(--o3)' }
      ];

      return '<section><div class="sec-head"><h2>Funnel</h2>' +
        '<span class="sec-note">how far people get</span>' +
        '<span class="right"><select id="fmonth">' + opts + '</select></span></div>' +
        '<div class="funnels">' +
          '<div class="card pad">' +
            '<div class="fn-title">On-site journey</div>' +
            '<div class="fn-sub">Tracked sessions on framework.co.ke.</div>' +
            stages(site, c, c.arrive || 0, 'arrivals') +
          '</div>' +
          '<div class="card pad">' +
            '<div class="fn-title">Conversation outcomes</div>' +
            '<div class="fn-sub">From Airtable — <b>all</b> conversations this month, not only tracked ones.</div>' +
            stages(out, c, c.conversation || 0, 'conversations') +
            (c.revenue ? '<div class="stage" style="margin-top:14px;border-top:1px solid var(--line);padding-top:12px">' +
              '<div class="row1"><span class="nm">Revenue</span><span class="val"><b>' + kes(c.revenue) + '</b></span></div></div>' : '') +
          '</div>' +
        '</div>' +
        '<div class="sec-note" style="margin-top:9px">Percentages are a share of the base, not of the stage above — ' +
          'these milestones are not nested (someone can tap WhatsApp straight from arrival). ' +
          'The two panels are separate populations until ref codes join them: the left is only sessions we tracked, ' +
          'the right is every conversation from any source.</div>' +
      '</section>';
    }
    // Every stage is shown as a share of the BASE (arrivals / conversations), not
    // of the previous stage. These milestones are not strictly nested — someone can
    // tap WhatsApp straight from arrival without ever "engaging" (we record
    // handoff_depth=arrived) — so "% of previous" can exceed 100% and implies a
    // funnel shape the data doesn't have.
    function stages(defs, c, base, baseLabel) {
      if (!base) return '<div class="empty">Nothing recorded in this period.</div>';
      return defs.map(function (s, i) {
        var v = c[s.k] || 0;
        var pct = base ? (100*v/base) : 0;
        var lab = i === 0 ? 'all ' + esc(baseLabel) : Math.round(pct) + '% of ' + esc(baseLabel);
        return '<div class="stage"><div class="row1"><span class="nm">' + esc(s.l) + '</span>' +
          '<span class="val"><b>' + num(v) + '</b><span class="pct">' + lab + '</span></span></div>' +
          '<div class="bar"><span style="width:' + Math.max(Math.min(pct,100),0.8) + '%;background:' + s.c + '"></span></div></div>';
      }).join('');
    }

    // ---------- monthly trend ----------
    function trend() {
      var cs = (D.cohorts || []).slice(-12);
      var head = '<section><div class="sec-head"><h2>Monthly trend</h2>' +
        '<span class="sec-note">conversations and sales over time</span>' +
        '<span class="right"><span class="seg">' +
          '<button data-trend="chart" class="' + (view.trendTable?'':'on') + '">Chart</button>' +
          '<button data-trend="table" class="' + (view.trendTable?'on':'') + '">Table</button>' +
        '</span></span></div>';
      if (!cs.length) return head + '<div class="card pad"><div class="empty">No monthly data yet.</div></div></section>';

      if (view.trendTable) {
        var rows = cs.slice().reverse().map(function (c) {
          return '<tr><td>' + esc(c.month) + '</td><td class="num">' + num(c.arrive) + '</td><td class="num">' + num(c.wa_handoff) +
            '</td><td class="num">' + num(c.conversation) + '</td><td class="num">' + num(c.quoted) + '</td><td class="num">' + num(c.sale) +
            '</td><td class="num">' + kes(c.revenue) + '</td></tr>';
        }).join('');
        return head + '<div class="card"><div class="tablewrap"><table><thead><tr><th>Month</th><th>Arrived</th>' +
          '<th>Handoffs</th><th>Conversations</th><th>Quoted</th><th>Sales</th><th>Revenue</th></tr></thead><tbody>' +
          rows + '</tbody></table></div></div></section>';
      }

      var W = 980, H = 210, padL = 34, padB = 26, padT = 8;
      var max = Math.max.apply(null, cs.map(function (c) { return Math.max(c.conversation||0, c.sale||0); }).concat([1]));
      var plotH = H - padB - padT, step = (W - padL) / cs.length;
      var bw = Math.min(16, step * 0.30);
      var g = '';
      for (var i = 0; i <= 3; i++) {
        var y = padT + plotH * i/3, val = Math.round(max * (3-i)/3);
        g += '<line x1="' + padL + '" y1="' + y + '" x2="' + W + '" y2="' + y + '" stroke="#262b36" stroke-width="1"/>' +
             '<text x="' + (padL-8) + '" y="' + (y+3.5) + '" text-anchor="end">' + val + '</text>';
      }
      var bars = cs.map(function (c, i) {
        var x = padL + i*step + step/2;
        var h1 = plotH * (c.conversation||0) / max, h2 = plotH * (c.sale||0) / max;
        // 2px surface gap between the adjacent pair
        var b = '<rect class="hit" x="' + (x - step/2) + '" y="' + padT + '" width="' + step + '" height="' + plotH +
                '" fill="transparent" data-i="' + i + '"/>';
        b += '<rect x="' + (x - bw - 1) + '" y="' + (padT + plotH - h1) + '" width="' + bw + '" height="' + Math.max(h1,0) +
             '" rx="3" fill="var(--s1)" pointer-events="none"/>';
        b += '<rect x="' + (x + 1) + '" y="' + (padT + plotH - h2) + '" width="' + bw + '" height="' + Math.max(h2,0) +
             '" rx="3" fill="var(--s2)" pointer-events="none"/>';
        b += '<text x="' + x + '" y="' + (H - padB + 15) + '" text-anchor="middle">' + esc(c.month.slice(2)) + '</text>';
        return b;
      }).join('');
      return head + '<div class="card pad">' +
        '<div class="legend"><span><i style="background:var(--s1)"></i>Conversations</span>' +
        '<span><i style="background:var(--s2)"></i>Sales</span></div>' +
        '<svg id="trendsvg" viewBox="0 0 ' + W + ' ' + H + '" width="100%" preserveAspectRatio="xMinYMin meet">' +
        g + bars + '</svg></div></section>';
    }

    // ---------- reference + refresh ----------
    function footerPanels() {
      var r = D.reference || {};
      var opts = (r.catalogIds||[]).map(function (id) { return '<option value="' + esc(id) + '">' + esc(id) + '</option>'; }).join('');
      return '<section>' +
        '<details><summary>Making a new ad — the two things every ad needs</summary><div class="inner">' +
          '<p><b>1 · URL parameters</b> — paste into the ad’s “URL parameters” field. Stamps the ad’s identity so conversations trace back to it. Same string for every ad.</p>' +
          copyrow(r.urlTags || '', 'urltags') +
          '<p style="margin-top:16px"><b>2 · Destination link</b> — point at a specific product, not the bare catalog.</p>' +
          '<div style="margin:6px 0"><select id="cfgpick">' + opts + '</select></div>' +
          copyrow('', 'deeplink') +
        '</div></details>' +
        '<details><summary>Refreshing this page</summary><div class="inner">' +
          '<p>This is a snapshot. To pull the latest numbers:</p><ol>' +
          '<li>On the Mac: Finder → <b>code</b> → <b>framework</b> → <b>framework-ops</b>.</li>' +
          '<li>Double-click <b>sync.command</b> (about 30 seconds), then press Enter when it finishes.</li>' +
          '<li>Reload this page — the badge up top should read “Synced today”.</li>' +
          '</ol><p style="color:var(--muted)">To also pull new WhatsApp conversations, double-click <b>run.command</b> instead and press <b>y</b> when it asks.</p>' +
        '</div></details></section>';
    }
    function copyrow(t, id) {
      return '<div class="copyrow"><textarea id="cp_' + id + '" rows="2" readonly>' + esc(t) + '</textarea>' +
        '<button class="btn" data-copy="' + id + '">Copy</button></div>';
    }

    // ---------- wiring ----------
    function resetSort() { view.sort = WIN[view.win].spend; view.dir = -1; }
    function wire() {
      var q = document.getElementById('adq');
      if (q) q.oninput = function () { view.q = q.value; var s = q.selectionStart; render();
        var n = document.getElementById('adq'); if (n) { n.focus(); n.setSelectionRange(s,s); } };
      document.querySelectorAll('[data-filter]').forEach(function (b) {
        b.onclick = function () { view.filter = b.getAttribute('data-filter'); render(); };
      });
      document.querySelectorAll('[data-group]').forEach(function (b) {
        b.onclick = function () {
          view.group = b.getAttribute('data-group');
          // Sorting by a column the new grouping doesn't have would silently
          // scramble the order — fall back to the window's spend column.
          if (view.sort === 'campaign' || view.sort === 'adset') resetSort();
          render();
        };
      });
      document.querySelectorAll('[data-win]').forEach(function (b) {
        b.onclick = function () {
          var prev = WIN[view.win];
          view.win = b.getAttribute('data-win');
          // Carry the sort across to the equivalent column in the new window, so
          // switching windows doesn't silently reorder the table under you.
          var role = null;
          ['spend','convos','cpc','sales','revenue'].forEach(function (r) { if (prev[r] === view.sort) role = r; });
          if (role) view.sort = WIN[view.win][role];
          else if (view.sort !== 'name' && view.sort !== 'flags' && view.sort !== 'campaign' && view.sort !== 'adset') resetSort();
          render();
        };
      });
      document.querySelectorAll('#adtable thead th').forEach(function (th) {
        th.onclick = function () {
          var k = th.getAttribute('data-k');
          if (view.sort === k) view.dir = -view.dir; else { view.sort = k; view.dir = -1; }
          render();
        };
      });
      var fm = document.getElementById('fmonth');
      if (fm) fm.onchange = function () { view.month = fm.value; render(); };
      document.querySelectorAll('[data-trend]').forEach(function (b) {
        b.onclick = function () { view.trendTable = b.getAttribute('data-trend') === 'table'; render(); };
      });
      document.querySelectorAll('[data-copy]').forEach(function (b) {
        b.onclick = function () {
          var el = document.getElementById('cp_' + b.getAttribute('data-copy'));
          el.select(); try { navigator.clipboard.writeText(el.value); } catch (e) { document.execCommand('copy'); }
          var o = b.textContent; b.textContent = 'Copied ✓'; setTimeout(function(){ b.textContent = o; }, 1200);
        };
      });
      var pick = document.getElementById('cfgpick'), dl = document.getElementById('cp_deeplink');
      if (pick && dl) { var upd = function () { dl.value = (D.reference.deeplinkBase||'') + pick.value; }; pick.onchange = upd; upd(); }
      trendHover();
    }

    function trendHover() {
      var svg = document.getElementById('trendsvg'); if (!svg) return;
      var cs = (D.cohorts || []).slice(-12), tip = document.getElementById('tip');
      svg.querySelectorAll('.hit').forEach(function (r) {
        r.style.cursor = 'default';
        r.addEventListener('mousemove', function (e) {
          var c = cs[Number(r.getAttribute('data-i'))]; if (!c) return;
          tip.innerHTML = '<div class="t">' + esc(c.month) + '</div>' +
            '<div class="r"><span><i style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--s1);margin-right:6px"></i>Conversations</span><span>' + num(c.conversation) + '</span></div>' +
            '<div class="r"><span><i style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--s2);margin-right:6px"></i>Sales</span><span>' + num(c.sale) + '</span></div>' +
            (c.revenue ? '<div class="r"><span>Revenue</span><span>' + kes(c.revenue) + '</span></div>' : '') +
            (c.arrive ? '<div class="r"><span>Tracked arrivals</span><span>' + num(c.arrive) + '</span></div>' : '');
          tip.style.opacity = 1;
          var x = e.clientX + 14, y = e.clientY - 10;
          if (x + 210 > window.innerWidth) x = e.clientX - 210;
          tip.style.left = x + 'px'; tip.style.top = y + 'px';
        });
        r.addEventListener('mouseleave', function () { tip.style.opacity = 0; });
      });
    }
  })();
  </script>
</body>
</html>
